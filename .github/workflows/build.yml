# NextChart 릴리스 (Windows / macOS).
# main 브랜치가 업데이트되면 patch 버전을 자동으로 올려 커밋·태그를 만들고,
# 각 OS 러너에서 빌드·서명 후 GitHub Release를 자동 게시(publish)한다.
# Tauri 업데이터용 latest.json + 서명(.sig)이 함께 업로드되어 사용자 확인형 자동 업데이트가 동작한다.
#
# 사전 준비(저장소 Settings → Secrets):
#   TAURI_SIGNING_PRIVATE_KEY          : ~/.tauri/next-chart.key 내용
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD : 키 비밀번호(없으면 빈 값)
#   (선택) APPLE_* / WINDOWS_* 코드서명·공증 인증서
name: release

on:
  workflow_dispatch:
  push:
    branches: [main]

# 연속 push 시 버전/태그 경합 방지 — 한 번에 하나의 릴리스만 진행.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # 1) main push마다 patch 버전을 올려 커밋·태그를 만든다.
  #    버전 범프 커밋은 [skip ci] + GITHUB_TOKEN push(워크플로 재트리거 안 함)로 무한 루프를 막는다.
  version:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump patch version
        id: bump
        run: |
          cur=$(jq -r .version app/package.json)
          IFS=. read -r MA MI PA <<< "$cur"
          next="$MA.$MI.$((PA+1))"
          echo "tag=v$next" >> "$GITHUB_OUTPUT"

          tmp=$(mktemp); jq --arg v "$next" '.version=$v' app/package.json > "$tmp" && mv "$tmp" app/package.json
          tmp=$(mktemp); jq --arg v "$next" '.version=$v' app/src-tauri/tauri.conf.json > "$tmp" && mv "$tmp" app/src-tauri/tauri.conf.json
          sed -i "0,/^version = \".*\"/s//version = \"$next\"/" app/src-tauri/Cargo.toml
          sed -i "/^name = \"next-chart\"/{n;s/^version = \".*\"/version = \"$next\"/}" app/src-tauri/Cargo.lock

      - name: Commit, tag & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "chore(release): ${{ steps.bump.outputs.tag }} [skip ci]"
          git tag "${{ steps.bump.outputs.tag }}"
          git push origin HEAD:main
          git push origin "${{ steps.bump.outputs.tag }}"

  # 2) 범프된 태그를 체크아웃해 각 OS에서 빌드·서명·릴리스 게시.
  build:
    needs: version
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.tag }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri

      - name: Install frontend deps
        working-directory: app
        run: npm install

      # WebView2/MSVC는 windows-latest 러너에 기본 내장.
      # 업데이터 아티팩트(.sig)는 TAURI_SIGNING_PRIVATE_KEY로 서명됨.
      - name: Build, sign & release
        uses: tauri-apps/tauri-action@v0
        env:
          # tauri-action이 GitHub Release를 생성·업로드하려면 토큰이 필요하다.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS 코드서명 + 공증(notarization). 아래 시크릿이 설정돼 있으면 tauri-action이
          # Developer ID로 서명하고 notarytool로 공증·스테이플까지 자동 처리한다.
          # (비어 있으면 무시되고 ad-hoc 서명으로 폴백 — Windows 러너에서도 무시됨.)
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: app
          args: ${{ matrix.args }}
          tagName: ${{ needs.version.outputs.tag }}
          releaseName: 'NextChart ${{ needs.version.outputs.tag }}'
          releaseBody: '자동 생성된 릴리스. 데스크톱 앱에서 [백업] 화면 → 업데이트 확인.'
          releaseDraft: false
          prerelease: false
          # latest.json(업데이터 매니페스트) 생성·업로드
          includeUpdaterJson: true

      # README의 OS별 직접 다운로드 링크(releases/latest/download/<고정 파일명>)가
      # 동작하도록, 버전이 박힌 번들 파일을 버전 무관 고정 이름으로 복사해 릴리스에 추가 업로드한다.
      - name: Upload stable-named macOS asset
        if: matrix.platform == 'macos-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DMG=$(ls app/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg | head -n1)
          cp "$DMG" NextChart-macos-aarch64.dmg
          gh release upload "${{ needs.version.outputs.tag }}" NextChart-macos-aarch64.dmg --clobber

      - name: Upload stable-named Windows assets
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $msi = Get-ChildItem app/src-tauri/target/release/bundle/msi/*.msi | Select-Object -First 1
          Copy-Item $msi.FullName NextChart-windows-x64.msi
          gh release upload "${{ needs.version.outputs.tag }}" NextChart-windows-x64.msi --clobber
          $exe = Get-ChildItem app/src-tauri/target/release/bundle/nsis/*.exe | Select-Object -First 1
          Copy-Item $exe.FullName NextChart-windows-x64-setup.exe
          gh release upload "${{ needs.version.outputs.tag }}" NextChart-windows-x64-setup.exe --clobber
